server.port=8082

# ??? Redis ????????????????????????????????????????????????
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:7000}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=20
spring.data.redis.lettuce.pool.max-idle=10
spring.data.redis.lettuce.pool.min-idle=2

# ??? Kafka ????????????????????????????????????????????????
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.max.in.flight.requests.per.connection=1
spring.kafka.producer.properties.delivery.timeout.ms=30000
spring.kafka.producer.properties.linger.ms=5
spring.kafka.producer.properties.batch.size=16384
spring.kafka.producer.properties.compression.type=snappy

# Consumer
spring.kafka.consumer.group-id=rate-limiter-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.ratelimiter.kafka.event
spring.kafka.consumer.properties.isolation.level=read_committed
spring.kafka.consumer.properties.max.poll.records=100
spring.kafka.consumer.properties.session.timeout.ms=30000
spring.kafka.consumer.properties.heartbeat.interval.ms=10000
spring.kafka.listener.ack-mode=manual_immediate
spring.kafka.listener.concurrency=3

# ??? Kafka Topics ?????????????????????????????????????????
kafka.topics.rate-limit-events=rate-limit-events
kafka.topics.rate-limit-alerts=rate-limit-alerts
kafka.topics.audit-log=audit-log
kafka.topics.policy-changes=policy-changes
kafka.topics.metrics-aggregation=metrics-aggregation
kafka.topics.dead-letter=rate-limit-events.DLT
kafka.topics.partitions=3
kafka.topics.replication-factor=1

# ??? App Config ???????????????????????????????????????????
app.rate-limiter.default-capacity=100
app.rate-limiter.default-refill-rate=10
app.rate-limiter.default-refill-period-seconds=1
app.rate-limiter.key-prefix=rl:

# Alert thresholds
app.alerts.block-rate-threshold=80.0
app.alerts.block-count-window-seconds=60
app.alerts.block-count-threshold=50
app.alerts.suspicious-rps-threshold=500

# Outbox pattern
app.outbox.flush-interval-ms=1000
app.outbox.max-batch-size=50

# Circuit breaker (Resilience4j)
resilience4j.circuitbreaker.instances.kafka-producer.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.kafka-producer.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.kafka-producer.sliding-window-size=10
resilience4j.circuitbreaker.instances.kafka-producer.permitted-number-of-calls-in-half-open-state=3

resilience4j.retry.instances.kafka-retry.max-attempts=3
resilience4j.retry.instances.kafka-retry.wait-duration=500ms
resilience4j.retry.instances.kafka-retry.retry-exceptions=org.apache.kafka.common.errors.RetriableException

# ??? CORS ?????????????????????????????????????????????????
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# ??? Actuator ?????????????????????????????????????????????
management.endpoints.web.exposure.include=health,metrics,info,prometheus
management.endpoint.health.show-details=always

# ??? Logging ??????????????????????????????????????????????
logging.level.com.ratelimiter=DEBUG
logging.level.org.apache.kafka=WARN
logging.level.org.springframework.kafka=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n